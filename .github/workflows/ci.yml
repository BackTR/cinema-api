name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cinema_user
          POSTGRES_PASSWORD: cinema_pass
          POSTGRES_DB: cinema_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Setup test environment
        run: |
          cp .env.example .env
          echo "DATABASE_URL=postgresql://cinema_user:cinema_pass@localhost:5432/cinema_test" >> .env
          echo "REDIS_HOST=localhost" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "REDIS_PASSWORD=" >> .env
          echo "JWT_ACCESS_SECRET=test-secret-key-minimum-32-chars-long" >> .env
          echo "JWT_REFRESH_SECRET=test-refresh-key-minimum-32-chars" >> .env
          echo "MIDTRANS_SERVER_KEY=test-key" >> .env
          echo "MIDTRANS_CLIENT_KEY=test-key" >> .env
          echo "MIDTRANS_IS_PRODUCTION=false" >> .env

      - name: Run Prisma migrations
        run: npx prisma migrate deploy

      - name: Run unit tests
        run: npm test -- --coverage --passWithNoTests

      - name: Build
        run: npm run build

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: always()

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -t cinema-api:latest .

      - name: Test Docker image
        run: |
          docker run --rm cinema-api:latest node -e "console.log('Docker OK')"
